# THE APPLICATION ONLY WORKS WITH IMGBURN (IT'S FREE)
# MUST CHANGE TO YOUR LOCATIONS TO WORK
ISO_MAKER_PATH = C:/Program Files/ImgBurn/
DISC_VOLUME = E:

# CHANGE "OUTPUT" AND "COVER_DIR" PATHS AS YOU NEED,
# IF YOU CHANGE "COVER_URL" THE COVERS WILL STOP APPEARING IN THE APPLICATION.
PS1_OUTPUT = C:/Games/PS1/_SteamInstalled/
PS1_COVER_DIR = C:/Program Files/Duckstation/covers/
PS1_COVER_URL = https://raw.githubusercontent.com/xlenore/psx-covers/refs/heads/main/covers/default/

# CHANGE "OUTPUT" AND "COVER_DIR" PATHS AS YOU NEED,
# IF YOU CHANGE "COVER_URL" THE COVERS WILL STOP APPEARING IN THE APPLICATION
PS2_OUTPUT = C:/Games/PS2/_SteamInstalled/
PS2_COVER_DIR = C:/Program Files/PCSX2/covers/
PS2_COVER_URL = https://raw.githubusercontent.com/xlenore/ps2-covers/refs/heads/main/covers/default/

# CONTROLLER STEAM DESKTOP OVERLAY MUST BE ENABLED
# "CONFIRM" IS CROSS IN A PLAYSTATION CONTROLLER, "CANCEL" IS CIRCLE AND "QUIT" IS START/OPTIONS.
# BETTER NOT TO CHANGE
BT_UP = Up
BT_DOWN = Down
BT_LEFT = Left
BT_RIGHT = Right
BT_CONFIRM = Return
BT_CANCEL = space
BT_QUIT = Escape